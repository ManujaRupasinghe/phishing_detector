<!DOCTYPE html>
<html>
<head>
    <title>Analysis Result</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #f5f5f5);
            text-align:center;
            padding-top:60px;
        }

        .container{
            width:500px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.15);
        }

        h2{
            color:#333;
            margin-bottom:25px;
        }

        .info{
            text-align:left;
            margin:15px 0;
            font-size:18px;
        }

        .risk{
            font-size:22px;
            font-weight:bold;
            padding:10px;
            border-radius:8px;
            margin:20px 0;
        }

        .safe{
            background:#d4edda;
            color:#155724;
        }

        .suspicious{
            background:#fff3cd;
            color:#856404;
        }

        .dangerous{
            background:#f8d7da;
            color:#721c24;
        }

        ul{
            text-align:left;
            padding-left:30px;
        }

        li{
            margin:8px 0;
        }

        .button{
            display:inline-block;
            margin-top:25px;
            padding:12px 25px;
            background:#007bff;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
        }

        .button:hover{
            background:#0056b3;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🛡️ Analysis Result</h2>

    <div class="info">
        <p><b>URL:</b> {{ url }}</p>
        <p><b>Score:</b> {{ result.score }}/100</p>
    </div>

    <div class="risk {{ result.level.lower() }}">
        Risk Level: {{ result.level }}
    </div>

    <h3>Detected Reasons:</h3>

    <ul>
        {% for r in result.reasons %}
            <li>{{ r }}</li>
        {% endfor %}
    </ul>

    <a href="/" class="button">🔍 Try Another URL</a>

</div>

</body>
</html>
