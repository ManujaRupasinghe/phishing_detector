<!DOCTYPE html>
<html>
<head>
    <title>Smart Phishing URL Detector</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
            padding-top: 100px;
        }

        .box {
            background: white;
            padding: 30px;
            width: 400px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🛡️ Smart Phishing URL Detector</h2>

    <form method="POST" action="/check">
        <input type="text" name="url" placeholder="Enter URL here" required>
        <br>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
        <div class="result">
            <p>URL: {{ url }}</p>
            <p>{{ result }}</p>
        </div>
    {% endif %}
</div>

</body>
</html>
